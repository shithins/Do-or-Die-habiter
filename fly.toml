# fly.toml app configuration file for Fly.io PocketBase deployment

app = "habit-grid-db"
primary_region = "ams" # This will be updated automatically during "fly launch"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false # Prevent SQLite database from shutting down when idle (maintains instant connection)
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "pb_data"
  destination = "/pb/pb_data"
  initial_size = "1gb"
